<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 - PEWM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f5f7fa;
            color: #1f2937;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 24px;
            text-align: center;
        }
        .error-code {
            font-size: 96px;
            font-weight: 800;
            color: #4f46e5;
            line-height: 1;
            margin-bottom: 16px;
        }
        .error-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .error-desc {
            font-size: 14px;
            color: #6b7280;
            max-width: 420px;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn:hover { opacity: 0.9; }
        .btn-primary {
            background: #4f46e5;
            color: white;
        }
        .btn-ghost {
            background: white;
            color: #4f46e5;
            border: 1px solid #e1e4e8;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
    </style>
</head>
<body>
    <div class="error-code">404</div>
    <div class="error-title">页面未找到</div>
    <div class="error-desc">
        请求的页面不存在或暂时无法访问。<br>
        可能是弱网环境下服务尚未就绪，请点击下方按钮返回首页或关闭应用后重试。
    </div>
    <div class="actions">
        <a href="/" class="btn btn-primary" id="home-btn">返回首页</a>
        <button class="btn btn-ghost" id="reload-btn">刷新页面</button>
        <button class="btn btn-danger" id="close-btn">关闭应用</button>
    </div>

    <script>
        document.getElementById('reload-btn').addEventListener('click', () => {
            location.reload();
        });

        document.getElementById('close-btn').addEventListener('click', () => {
            if (window.pywebview && window.pywebview.api && window.pywebview.api.exit_app) {
                window.pywebview.api.exit_app();
            } else {
                window.close();
            }
        });

        // 在 pywebview 环境中，点击返回首页也尝试通过 API 通知后端
        document.getElementById('home-btn').addEventListener('click', (e) => {
            if (window.pywebview && window.pywebview.api && window.pywebview.api.go_home) {
                e.preventDefault();
                window.pywebview.api.go_home();
            }
        });
    </script>
</body>
</html>
