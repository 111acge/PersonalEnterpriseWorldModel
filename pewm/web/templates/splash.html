<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEWM 启动中</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow: hidden;
            user-select: none;
        }
        .logo {
            width: 72px;
            height: 72px;
            background: rgba(255,255,255,0.15);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        p {
            font-size: 13px;
            opacity: 0.85;
            margin-bottom: 32px;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255,255,255,0.25);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 11px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="logo">PEWM</div>
    <h1>个人企业世界模型</h1>
    <p>正在启动本地服务，请稍候...</p>
    <div class="spinner"></div>
    <div class="footer">Flask + pywebview</div>
</body>
</html>
