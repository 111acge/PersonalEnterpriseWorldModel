entity_type: process
storage_path: 20-Ontology/processes/
required_frontmatter:
  - process_id
  - name
  - owner
  - confidence
  - source
  - updated_at
content_template: |
  # {{ name }}

  > 编号：{{ process_id }} | 负责人：{{ owner }}
  > 置信度：{{ confidence }} | 来源：{{ source }} | 更新于：{{ updated_at }}

  ## 触发条件

  {{ trigger }}

  ## 流程步骤

  {{ steps }}

  ## 涉及系统

  {{ systems | default('待补充') }}

  ## 关联常量

  {{ related_constants | default('待补充') }}
auto_merge: true
